name: "Build TierUp"

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: build-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Mac - Apple Silicon (M1+)
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            target: "macos-aarch64"
          # Mac - Intel
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "macos-x86_64"
          # iOS
          - platform: "macos-latest"
            args: ""
            target: "ios"

    runs-on: ${{ matrix.platform }}

    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      VITE_RAWG_API_KEY: ${{ secrets.VITE_RAWG_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: version_check
        shell: bash
        run: |
          if git diff HEAD~1 HEAD --name-only | grep -E '(package\.json|src-tauri/tauri\.conf\.json|Cargo\.toml)'; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"
          cache-dependency-path: package-lock.json

      # Cache Cargo dependencies
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # Install Rust
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'macos-aarch64' && 'aarch64-apple-darwin' || matrix.target == 'macos-x86_64' && 'x86_64-apple-darwin' || '' }}

      # iOS: Install Rust iOS targets
      - name: Add iOS Rust targets
        if: matrix.target == 'ios'
        run: |
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim

      # iOS: Install ios-deploy for device deployment
      - name: Install ios-deploy
        if: matrix.target == 'ios'
        run: brew install ios-deploy

      # Import Apple Auth Key (for notarization + App Store upload)
      - name: Import Apple Auth Key
        env:
          APPLE_AUTH_KEY_BASE64: ${{ secrets.APPLE_AUTH_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          echo "$APPLE_AUTH_KEY_BASE64" | base64 --decode > "AuthKey_${APPLE_API_KEY_ID}.p8"
          first_line=$(head -n 1 "AuthKey_${APPLE_API_KEY_ID}.p8")
          if [[ "$first_line" != "-----BEGIN PRIVATE KEY-----" ]]; then
            echo "Error: Auth key does not start with expected header."
            exit 1
          fi
          echo "APPLE_API_KEY_PATH=$PWD/AuthKey_${APPLE_API_KEY_ID}.p8" >> $GITHUB_ENV
          echo "Auth key imported successfully."

      # Import Apple Developer Certificate (for code signing)
      - name: Import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      # Extract signing certificate identity
      - name: Extract Certificate Identity
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application\|Apple Distribution\|iPhone Distribution")
          CERT_ID=$(echo "$CERT_INFO" | head -n 1 | awk -F'"' '{print $2}')
          if [[ -z "$CERT_ID" ]]; then
            echo "Error: Could not find a valid signing certificate."
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi
          echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
          echo "Using certificate: $CERT_ID"

      # Install frontend dependencies
      - name: Install frontend dependencies
        run: npm install

      # iOS: Initialize Tauri iOS project
      - name: Initialize Tauri iOS project
        if: matrix.target == 'ios'
        run: npm run tauri ios init

      # iOS: Import provisioning profile
      - name: Import iOS Provisioning Profile
        if: matrix.target == 'ios'
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/TierUp.mobileprovision
          echo "iOS provisioning profile installed."

      # ── BUILD: Mac (non-release) ──────────────────────────────────────────
      - name: Build Mac (non-release)
        if: matrix.target != 'ios' && (github.ref_name != 'master' || steps.version_check.outputs.version_changed != 'true')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUST_BACKTRACE: "full"
        with:
          args: ${{ matrix.args }} --verbose

      # ── BUILD: Mac (release) ──────────────────────────────────────────────
      - name: Build & Release Mac
        if: matrix.target != 'ios' && github.ref_name == 'master' && steps.version_check.outputs.version_changed == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          RUST_BACKTRACE: "full"
        with:
          tagName: tierup-v__VERSION__
          releaseName: "TierUp v__VERSION__"
          releaseBody: "See the assets to download and install TierUp."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }} --verbose

      # ── BUILD: iOS ────────────────────────────────────────────────────────
      - name: Build iOS (non-release)
        if: matrix.target == 'ios' && (github.ref_name != 'master' || steps.version_check.outputs.version_changed != 'true')
        run: |
          npm run tauri ios build -- --export-method app-store-connect --verbose
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          RUST_BACKTRACE: "full"

      - name: Build & Upload iOS to App Store
        if: matrix.target == 'ios' && github.ref_name == 'master' && steps.version_check.outputs.version_changed == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          RUST_BACKTRACE: "full"
        run: |
          # Build the IPA
          npm run tauri ios build -- --export-method app-store-connect --verbose

          # Upload to App Store Connect
          IPA_PATH="src-tauri/gen/apple/build/arm64/TierUp.ipa"
          if [ ! -f "$IPA_PATH" ]; then
            echo "Error: IPA file not found at $IPA_PATH"
            ls src-tauri/gen/apple/build/ || true
            exit 1
          fi

          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER"

          echo "✅ iOS app uploaded to App Store Connect!"

      # Upload iOS IPA as artifact (available in GitHub Actions for every build)
      - name: Upload iOS IPA artifact
        if: matrix.target == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: TierUp-iOS.ipa
          path: src-tauri/gen/apple/build/arm64/TierUp.ipa
          if-no-files-found: warn

  # ── Finalize release notes ─────────────────────────────────────────────────
  finalize-release-notes:
    name: Finalize Release Notes
    needs: build-tauri
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    if: github.ref_name == 'master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: version_check
        shell: bash
        run: |
          if git diff HEAD~1 HEAD --name-only | grep -E '(package\.json|src-tauri/tauri\.conf\.json|Cargo\.toml)'; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate and apply release notes
        if: steps.version_check.outputs.version_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=$(jq -r '.version' package.json)
          TAG_NAME="tierup-v${VERSION}"

          git fetch --tags --force
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG_NAME}$" | head -n 1)

          if [ -z "$PREVIOUS_TAG" ]; then
            RELEASE_NOTES=$(gh release notes generate "$TAG_NAME" --repo "${{ github.repository }}" 2>/dev/null || echo "")
          else
            RELEASE_NOTES=$(gh release notes generate "$TAG_NAME" --previous-tag "$PREVIOUS_TAG" --repo "${{ github.repository }}" 2>/dev/null || echo "")
          fi

          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="See the assets to download and install TierUp."
          fi

          printf '%s\n' "$RELEASE_NOTES" > release-notes.md
          gh release edit "$TAG_NAME" --repo "${{ github.repository }}" --notes-file release-notes.md
